<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авіаційні Іконки — Фінальна Нагорода</title>
    <style>
        body {
            background-color: #ffffff;
            color: #111111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            margin: 0; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .demo-matrix { border-collapse: collapse; width: 100%; max-width: 1100px; }
        .demo-matrix th { font-weight: 600; font-size: 14px; color: #555; padding: 15px; border-bottom: 2px solid #eee; }
        .demo-matrix td { padding: 30px 10px; text-align: center; vertical-align: middle; border-bottom: 1px solid #f5f5f5; }
        .row-label { font-weight: 700; font-size: 13px; color: #333; text-align: left !important; width: 100px; }

        /* Контейнер */
        .badge-wrapper { position: relative; width: 150px; height: 150px; display: inline-flex; align-items: center; justify-content: center; }
        
        /* Задній план — підставки (для lvl-1) */
        .badge-bg-stand { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        
        /* Передній план — коло та напис */
        .badge-circle { position: relative; width: 82px; height: 82px; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 3; overflow: hidden; }
        
        .lvl-1 .badge-circle { box-shadow: inset 0 1px 3px rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.25); border: 1px solid rgba(255, 255, 255, 0.15); }
        .lvl-1 .bg-airbus  { background: radial-gradient(circle, rgba(22,92,63,1) 0%, rgba(10,48,32,1) 100%); }
        .lvl-1 .bg-boeing  { background: radial-gradient(circle, rgba(24,68,126,1) 0%, rgba(10,33,63,1) 100%); }

        .lvl-2 .badge-circle, .lvl-3 .badge-circle, .lvl-4 .badge-circle, .lvl-5 .badge-circle {
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.2), 0 4px 10px rgba(0,0,0,0.35);
        }
        
        /* Глянцевий блік */
        .badge-wrapper::before {
            content: ''; position: absolute; top: 34px; left: 34px; width: 82px; height: 41px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.12), rgba(255,255,255,0)); pointer-events: none; z-index: 4; border-radius: 41px 41px 0 0;
        }

        /* Декор переднього плану (вінки рівнів 2-5) */
        .badge-decor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        
        .badge-text { font-size: 21px; font-weight: 500; letter-spacing: 0.5px; color: #ffffff; text-shadow: 0 2px 4px rgba(0,0,0,0.8); z-index: 6; text-transform: uppercase; text-align: center; width: 100%; line-height: 1; margin: 0; padding: 0; }
        
        .bg-airbus { background: radial-gradient(circle, #165c3f 0%, #0a3020 100%); }
        .bg-boeing { background: radial-gradient(circle, #18447e 0%, #0a213f 100%); }

        /* Градієнти та кольори елементів SVG */
        .wreath-leaf, .wreath-star, .wreath-pedestal, .wreath-base { fill: inherit; stroke: rgba(0,0,0,0.25); stroke-width: 0.4px; }
        .meme-stand { fill: #1a1a1a; stroke: #0a0a0a; stroke-width: 0.5px; filter: drop-shadow(0 2px 3px rgba(0,0,0,0.4)); }
        
        .lvl-2 .badge-decor { fill: url(#final-bronze); }
        .lvl-3 .badge-decor { fill: url(#final-silver); }
        .lvl-4 .badge-decor { fill: url(#final-gold); }
        .lvl-5 .badge-decor { fill: url(#final-gold); }

        .lvl-2 .badge-decor, .lvl-3 .badge-decor, .lvl-4 .badge-decor { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.35)); }
        .lvl-5 .badge-decor { filter: drop-shadow(0 0 5px rgba(240, 190, 40, 0.9)) drop-shadow(0 2px 4px rgba(0,0,0,0.4)); }
    </style>
</head>
