<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NewSky Live Traffic</title>

    <style>

        body{
            background:#dcdcdc;
            font-family:Arial, sans-serif;
            margin:0;
            padding:0;
        }

        .wrapper{
            padding:10px;
        }

        .header{
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .updated{
            font-size:14px;
            color:#555;
            font-weight:normal;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#efefef;
        }

        th{
            background:#ffffff;
            border:1px solid #666;
            padding:6px;
            font-size:14px;
            text-align:center;
        }

        td{
            border:1px solid #666;
            padding:6px;
            font-size:14px;
            background:#efefef;
        }

        .callsign{
            font-weight:bold;
            font-size:16px;
            white-space:nowrap;
        }

        .aircraft{
            color:#4169e1;
        }

        .route{
            font-weight:bold;
            text-align:center;
            white-space:nowrap;
        }

        .time{
            color:green;
            text-align:center;
            white-space:nowrap;
        }

        .status{
            color:#cc7a00;
            text-align:center;
            font-weight:bold;
            white-space:nowrap;
        }

        .pilot{
            text-align:center;
            white-space:nowrap;
        }

        .sim{
            text-align:center;
            color:#555;
            white-space:nowrap;
        }

        .type{
            text-align:center;
            font-weight:bold;
            white-space:nowrap;
        }
.airline-subtitle{
    color:#666;
    font-size:13px;
    line-height:16px;
}

.aircraft-name{
    color:#4169e1;
    font-size:14px;
    line-height:16px;
}

.route-cell{
    text-align:center;
    font-weight:bold;
    white-space:nowrap;
}

.time-cell{
    text-align:center;
    color:green;
    white-space:nowrap;
}

.status-cell{
    text-align:center;
    color:#cc7a00;
    font-weight:bold;
    white-space:nowrap;
}

.pilot-cell{
    text-align:center;
    line-height:18px;
}

.pilot-extra{
    color:#666;
    font-size:13px;
}

.flight-icon{
    width:15px;
    height:15px;
    vertical-align:middle;
    margin-right:4px;
}
    </style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        LIVE TRAFFIC NEWSKY: українські авіакомпанії
        <span class="updated" id="updated"></span>
    </div>

    <table>

        <thead>
            <tr>
                <th>CALLSIGN</th>
                <th>AIRCRAFT</th>
                <th>ROUTE</th>
                <th>DEP.TIME</th>
                <th>STATUS</th>
                <th>PILOT</th>

            </tr>
        </thead>

        <tbody id="trafficBody"></tbody>

    </table>

</div>

<script>

async function loadTraffic() {

    try {

        const response = await fetch(
            "https://newsky.app/api/airline-api/flights/ongoing",
            {
                headers: {
                    "Authorization": "Bearer UKR_uSTNynarbU8B8A61nvDLqmSl7Ji8xK"
                }
            }
        );

        const data = await response.json();

        const tbody = document.getElementById("trafficBody");

        tbody.innerHTML = "";

data.results
.filter(flight => !flight.network?.name)
.forEach(flight => {

    const tr = document.createElement("tr");

    const callsign =
        (flight.airline?.icao || "") +
        (flight.flightNumber || "");

    const aircraft =
        flight.aircraft?.airframe?.name || "Unknown";

    const route =
        `${flight.dep?.icao || "----"} → ${flight.arr?.icao || "----"}`;

    const depTime = new Date(flight.depTimeAct);

    const depUTC =
        depTime.getUTCHours().toString().padStart(2, "0") +
        ":" +
        depTime.getUTCMinutes().toString().padStart(2, "0");

    // -----------------------------------
    // ARRIVAL TIME (temporary estimate)
    // -----------------------------------

    const arrDate = new Date(depTime.getTime() + (2 * 60 * 60 * 1000));

    const arrUTC =
        arrDate.getUTCHours().toString().padStart(2, "0") +
        ":" +
        arrDate.getUTCMinutes().toString().padStart(2, "0");

    // -----------------------------------
    // STATUS LOGIC
    // same style as VATSIM
    // -----------------------------------

    const now = new Date();

    const minutesFromDeparture =
        (now - depTime) / 60000;

    let status = "EN-ROUTE";

    if (minutesFromDeparture < 15) {
        status = "DEPARTING";
    }

    if (minutesFromDeparture > 90) {
        status = "ARRIVING";
    }

    // -----------------------------------

    const pilot =
        flight.pilot?.fullname || "Unknown";

    // -----------------------------------
    // FLIGHT TYPE ICON
    // -----------------------------------

    let icon = "iconFree.png";
    let label = "NewSky Offline";

    if (flight.schedule) {
        icon = "iconSchedule.png";
        label = "Scheduled Offline";
    }

    if (flight.charter) {
        icon = "iconCharter.png";
        label = "Charter Offline";
    }

    tr.innerHTML = `

        <td class="callsign">

            ${callsign}

        </td>

        <td>

            <div class="airline-subtitle">
                Ukraine Alliance "UCAA"
            </div>

            <div class="aircraft-name">
                ${aircraft}
            </div>

        </td>

        <td class="route-cell">

            ${route}

        </td>

        <td class="time-cell">

            DEP ${depUTC} - ARR ${arrUTC}

        </td>

        <td class="status-cell">

            ${status}

        </td>

        <td class="pilot-cell">

            ${pilot}

            <div class="pilot-extra">

                <img src="${icon}" class="flight-icon">

                ${label}

            </div>

        </td>
    `;

    tbody.appendChild(tr);

});

        document.getElementById("updated").innerText =
            "оновлено " +
            new Date().toUTCString().slice(17, 22) +
            "z";

    } catch (err) {

        console.error(err);

    }
}

loadTraffic();

setInterval(loadTraffic, 180000);

</script>

</body>
</html>
