<div class="wrapper">

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
  crossorigin="">
</script>
    
<script>

async function loadTraffic() {

    try {

        const response = await fetch(
            "https://newsky.app/api/airline-api/flights/ongoing",
            {
                headers: {
                    "Authorization": "Bearer UKR_uSTNynarbU8B8A61nvDLqmSl7Ji8xK"
                }
            }
        );

        const data = await response.json();

        const tbody = document.getElementById("trafficBody");

        tbody.innerHTML = "";

data.results
.filter(flight => !flight.network?.name)
.forEach(flight => {

    const tr = document.createElement("tr");

    const callsign =
        (flight.airline?.icao || "") +
        (flight.flightNumber || "");

    const aircraft =
        flight.aircraft?.airframe?.name || "Unknown";

    const route =
        `${flight.dep?.icao || "----"} → ${flight.arr?.icao || "----"}`;

    const depTime = new Date(flight.depTimeAct);

let depUTC = "--:--";

if (flight.depTimeAct) {

    depUTC =
        depTime.getUTCHours().toString().padStart(2, "0") +
        ":" +
        depTime.getUTCMinutes().toString().padStart(2, "0");

}

    // -----------------------------------
    // ARRIVAL TIME (temporary estimate)
    // -----------------------------------

let arrUTC = "--:--";

if (flight.depTimeAct) {

    const arrDate = new Date(depTime.getTime() + (2 * 60 * 60 * 1000));

    arrUTC =
        arrDate.getUTCHours().toString().padStart(2, "0") +
        ":" +
        arrDate.getUTCMinutes().toString().padStart(2, "0");

}

    // -----------------------------------
    // STATUS LOGIC
    // same style as VATSIM
    // -----------------------------------

    const now = new Date();

    const minutesFromDeparture =
        (now - depTime) / 60000;

    let status = "EN-ROUTE";

if (!flight.depTimeAct) {

    status = "PLANNED";

} else {

    if (minutesFromDeparture < 15) {
        status = "DEPARTING";
    }

    if (minutesFromDeparture > 90) {
        status = "ARRIVING";
    }

}

    // -----------------------------------

    const pilot =
        flight.pilot?.fullname || "Unknown";

    // -----------------------------------
    // FLIGHT TYPE ICON
    // -----------------------------------

    
    let label = "NewSky Offline";

    if (flight.schedule) {
        
        label = "Scheduled Offline";
    }

    if (flight.charter) {
               label = "Charter Offline";
    }

    tr.innerHTML = `

        <td class="callsign">

            ${callsign}

        </td>

        <td>

            <div class="airline-subtitle">
                Ukraine Alliance "UCAA"
            </div>

            <div class="aircraft-name">
                ${aircraft}
            </div>

        </td>

        <td class="route-cell">

            ${route}

        </td>

        <td class="time-cell">

DEP ${depUTC} - ARR --:--

        </td>

        <td class="status-cell">

            ${status}

        </td>

        <td class="pilot-cell">

            ${pilot}

            <div class="pilot-extra">

                                ${label}

            </div>

        </td>
    `;

    tbody.appendChild(tr);

});

        document.getElementById("updated").innerText =
            "оновлено " +
            new Date().toUTCString().slice(17, 22) +
            "z";

    } catch (err) {

        console.error(err);

    }
}

loadTraffic();

setInterval(loadTraffic, 180000);

// =========================
// UKHH TEST MAP / OSM GROUND DATA
// =========================

function initUkhhTestMap() {
    const mapEl = document.getElementById("ukhh-test-map");
    if (!mapEl || typeof L === "undefined") return;

    const ukhhLat = 49.9248;
    const ukhhLon = 36.2900;

    const map = L.map(mapEl, {
        zoomControl: true,
        attributionControl: true,
        scrollWheelZoom: true
    }).setView([ukhhLat, ukhhLon], 15);

    L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    L.marker([ukhhLat, ukhhLon], {
        icon: L.divIcon({
            className: "",
            html: `<span class="ukhh-label">UKHH Харків</span>`,
            iconSize: [90, 20],
            iconAnchor: [45, 10]
        })
    }).addTo(map);

    loadUkhhGroundLayout(map, ukhhLat, ukhhLon);
}

async function loadUkhhGroundLayout(map, lat, lon) {
    const query = `
[out:json][timeout:25];
(
  way["aeroway"~"runway|taxiway|taxilane|apron"](around:3000,${lat},${lon});
  node["aeroway"="parking_position"](around:3000,${lat},${lon});
  way["aeroway"="parking_position"](around:3000,${lat},${lon});
);
out geom;
`;

    try {
        const response = await fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        });

        if (!response.ok) {
            throw new Error("Overpass HTTP " + response.status);
        }

        const data = await response.json();

        data.elements.forEach(el => {
            const type = el.tags?.aeroway || "";
            const ref = el.tags?.ref || "";
            const name = el.tags?.name || "";
            const label = ref || name || type;

            if (el.type === "way" && Array.isArray(el.geometry)) {
                const points = el.geometry.map(p => [p.lat, p.lon]);

                if (type === "apron") {
                    L.polygon(points, {
                        color: "#777777",
                        weight: 1,
                        opacity: 0.75,
                        fillColor: "#d0d0d0",
                        fillOpacity: 0.35
                    })
                    .bindPopup(`<div class="ground-popup">APRON<br>${label}</div>`)
                    .addTo(map);
                }

                else if (type === "runway") {
                    L.polyline(points, {
                        color: "#444444",
                        weight: 8,
                        opacity: 0.65
                    })
                    .bindPopup(`<div class="ground-popup">RUNWAY<br>${label}</div>`)
                    .addTo(map);
                }

                else if (type === "taxiway" || type === "taxilane") {
                    L.polyline(points, {
                        color: "#d98c00",
                        weight: 3,
                        opacity: 0.9
                    })
                    .bindPopup(`<div class="ground-popup">${type.toUpperCase()}<br>${label}</div>`)
                    .addTo(map);
                }

                else if (type === "parking_position") {
                    L.polyline(points, {
                        color: "#cc0000",
                        weight: 2,
                        opacity: 0.9
                    })
                    .bindPopup(`<div class="ground-popup">STAND<br>${label}</div>`)
                    .addTo(map);
                }
            }

            if (el.type === "node" && type === "parking_position") {
                L.circleMarker([el.lat, el.lon], {
                    radius: 4,
                    color: "#cc0000",
                    weight: 1,
                    fillColor: "#ffffff",
                    fillOpacity: 0.9
                })
                .bindPopup(`<div class="ground-popup">STAND<br>${label}</div>`)
                .addTo(map);
            }
        });

        console.log("UKHH ground elements loaded:", data.elements.length);

    } catch (err) {
        console.error("UKHH ground layout load failed:", err);
    }
}

document.addEventListener("DOMContentLoaded", initUkhhTestMap);

// ======================
// UKHH MAP TEST
// ======================

const map = L.map("ukhhMap", {
    zoomControl: true
}).setView([49.9245, 36.2895], 15);

L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
}).addTo(map);

// Маркер аеропорту
L.marker([49.9245, 36.2895])
    .addTo(map)
    .bindPopup("UKHH Харків");

// ----------------------
// PNG overlay
// ----------------------
// Заміни назву файла, якщо треба
const ukhhOverlayUrl = "UKHH_overlay.png";

// Початкові bounds для тесту
const ukhhOverlayBounds = [
    [49.9140, 36.2620], // south-west
    [49.9335, 36.3135]  // north-east
];

const ukhhOverlay = L.imageOverlay(ukhhOverlayUrl, ukhhOverlayBounds, {
    opacity: 0.82,
    interactive: false,
    zIndex: 10
}).addTo(map);

// Щоб карта одразу відкривала потрібну зону
map.fitBounds(ukhhOverlayBounds);
    
</script>
