<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>NewSky Live Traffic</title>

    <style>

        body{
            background:#dcdcdc;
            font-family:Arial, sans-serif;
            margin:0;
            padding:0;
        }

        .wrapper{
            padding:10px;
        }

        .header{
            font-size:18px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .updated{
            font-size:14px;
            color:#555;
            font-weight:normal;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:#efefef;
        }

        th{
            background:#ffffff;
            border:1px solid #666;
            padding:6px;
            font-size:14px;
            text-align:center;
        }

        td{
            border:1px solid #666;
            padding:6px;
            font-size:14px;
            background:#efefef;
        }

        .callsign{
            font-weight:bold;
            font-size:16px;
            white-space:nowrap;
        }

        .aircraft{
            color:#4169e1;
        }

        .route{
            font-weight:bold;
            text-align:center;
            white-space:nowrap;
        }

        .time{
            color:green;
            text-align:center;
            white-space:nowrap;
        }

        .status{
            color:#cc7a00;
            text-align:center;
            font-weight:bold;
            white-space:nowrap;
        }

        .pilot{
            text-align:center;
            white-space:nowrap;
        }

        .sim{
            text-align:center;
            color:#555;
            white-space:nowrap;
        }

        .type{
            text-align:center;
            font-weight:bold;
            white-space:nowrap;
        }

    </style>
</head>

<body>

<div class="wrapper">

    <div class="header">
        LIVE TRAFFIC NEWSKY: українські авіакомпанії
        <span class="updated" id="updated"></span>
    </div>

    <table>

        <thead>
            <tr>
                <th>CALLSIGN</th>
                <th>AIRCRAFT</th>
                <th>ROUTE</th>
                <th>DEP.TIME</th>
                <th>STATUS</th>
                <th>PILOT</th>
                <th>TYPE</th>
                <th>SIM</th>
            </tr>
        </thead>

        <tbody id="trafficBody"></tbody>

    </table>

</div>

<script>

async function loadTraffic() {

    try {

        const response = await fetch(
            "https://newsky.app/api/airline-api/flights/ongoing",
            {
                headers: {
                    "Authorization": "Bearer YOUR_API_KEY_HERE"
                }
            }
        );

        const data = await response.json();

        const tbody = document.getElementById("trafficBody");

        tbody.innerHTML = "";

        data.results.forEach(flight => {

            const tr = document.createElement("tr");

            const callsign =
                (flight.airline?.icao || "") +
                (flight.flightNumber || "");

            const aircraft =
                flight.aircraft?.airframe?.name || "Unknown";

            const route =
                `${flight.dep?.icao || "----"} → ${flight.arr?.icao || "----"}`;

            const depTime = new Date(flight.depTimeAct);

            const depUTC =
                depTime.getUTCHours().toString().padStart(2, "0") +
                ":" +
                depTime.getUTCMinutes().toString().padStart(2, "0");

            const pilot =
                flight.pilot?.fullname || "Unknown";

            const simulator =
                (flight.simulator || "").toUpperCase();

            const flightType =
                (flight.type || "").toUpperCase();

            let status = "EN-ROUTE";

            if (flight.arrTimeAct) {
                status = "ARRIVED";
            }

            if (flight.emergency) {
                status = "EMERGENCY";
            }

            tr.innerHTML = `
                <td class="callsign">
                    ${callsign}
                </td>

                <td>
                    <div class="aircraft">
                        ${aircraft}
                    </div>
                </td>

                <td class="route">
                    ${route}
                </td>

                <td class="time">
                    DEP ${depUTC}z
                </td>

                <td class="status">
                    ${status}
                </td>

                <td class="pilot">
                    ${pilot}
                </td>

                <td class="type">
                    ${flightType}
                </td>

                <td class="sim">
                    ${simulator}
                </td>
            `;

            tbody.appendChild(tr);
        });

        document.getElementById("updated").innerText =
            "оновлено " +
            new Date().toUTCString().slice(17, 22) +
            "z";

    } catch (err) {

        console.error(err);

    }
}

loadTraffic();

setInterval(loadTraffic, 180000);

</script>

</body>
</html>
