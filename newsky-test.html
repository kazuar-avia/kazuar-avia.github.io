<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UKHH Overlay Test</title>

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
    }

    .header {
      padding: 8px 10px;
      background: #ffffff;
      border-bottom: 1px solid #666;
      font-size: 16px;
      font-weight: bold;
    }

    #ukhhMap {
      width: 100%;
      height: calc(100vh - 36px);
      background: #eef2f3;
    }

    .ukhh-label {
      display: inline-block;
      padding: 2px 5px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #444;
      border-radius: 3px;
      color: #004b9b;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }
  </style>
</head>

<body>

<div class="header">
  UKHH Харків — тест PNG overlay
</div>

<div id="ukhhMap"></div>

<script
  src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>
  const map = L.map("ukhhMap", {
    zoomControl: true,
    attributionControl: true,
    scrollWheelZoom: true
  });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
  }).addTo(map);

  // Початковий центр UKHH
  map.setView([49.9245, 36.2895], 15);

  // Маркер UKHH
  L.marker([49.9245, 36.2895], {
    icon: L.divIcon({
      className: "",
      html: '<span class="ukhh-label">UKHH Харків</span>',
      iconSize: [90, 20],
      iconAnchor: [45, 10]
    })
  }).addTo(map);

  // PNG overlay
  // Файл UKHH1.png має лежати поруч із цією HTML-сторінкою
  const ukhhOverlayBounds = [
    [49.9140, 36.2620], // south-west
    [49.9335, 36.3135]  // north-east
  ];

  L.imageOverlay("UKHH_overlay.png", ukhhOverlayBounds, {
    opacity: 0.82,
    interactive: false
  }).addTo(map);

  // Одразу показуємо всю область накладеної картинки
  map.fitBounds(ukhhOverlayBounds);
</script>

</body>
</html>
