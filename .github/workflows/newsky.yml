name: Update NewSky Traffic

on:
  schedule:
    - cron: "*/2 * * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run script
        run: python update_newsky.py

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add newsky-live.json debug.html

          git diff --quiet && git diff --staged --quiet || git commit -m "Update NewSky traffic"

          git push
